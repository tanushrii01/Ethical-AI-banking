services:
  - type: web
    name: ethical-ai-banking
    runtime: python
    pythonVersion: "3.11"

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app

    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/app.sqlite

    disk:
      name: db-data
      mountPath: /var/data
      sizeGB: 1