services:
  - type: web
    name: ethical-ai-banking
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: DATABASE_PATH
        value: /var/data/app.sqlite  # Points to the persistent disk below
      - key: PYTHON_VERSION
        value: 3.11.0

    disk:
      name: db-data
      mountPath: /var/data
      sizeGB: 1
